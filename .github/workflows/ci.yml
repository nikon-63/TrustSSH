name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  terraform:
    name: Terraform checks
    runs-on: ubuntu-latest

    env:
      AWS_EC2_METADATA_DISABLED: "true"
      TF_IN_AUTOMATION: "true"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Make helper scripts executable
        run: chmod +x helpers/*.sh

      - name: Run Terraform checks
        run: make test-terraform

  lambda:
    name: Lambda tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Make helper scripts executable
        run: chmod +x helpers/*.sh

      - name: Run Lambda tests
        run: make test-lambda

  cli:
    name: CLI tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Make helper scripts executable
        run: chmod +x helpers/*.sh

      - name: Run CLI tests
        run: make test-cli

  ci-result:
    name: CI result
    runs-on: ubuntu-latest
    needs:
      - terraform
      - lambda
      - cli
    if: always()

    steps:
      - name: Check all job results
        run: |
          echo "Terraform result: ${{ needs.terraform.result }}"
          echo "Lambda result:    ${{ needs.lambda.result }}"
          echo "CLI result:       ${{ needs.cli.result }}"

          if [[ "${{ needs.terraform.result }}" != "success" || \
                "${{ needs.lambda.result }}" != "success" || \
                "${{ needs.cli.result }}" != "success" ]]; then
            echo "One or more CI jobs failed"
            exit 1
          fi

          echo "All CI jobs passed"